<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://rinpqlroqxblsmjqcequ.supabase.co; img-src 'self' data: blob:;"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Events — OJAS 2K26</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --orange: #F97316; --pink: #EC4899; --purple: #8B5CF6;
    --blue: #3B82F6; --teal: #14B8A6;
    --dark-navy: #0D1117; --card-bg: #111827;
    --border: rgba(255,255,255,0.08); --text: #f1f5f9; --muted: rgba(255,255,255,0.45);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--dark-navy); color: var(--text);
    font-family: 'Inter', sans-serif; min-height: 100vh;
    background-image:
      radial-gradient(ellipse 70% 40% at 10% 20%, rgba(249,115,22,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 90% 80%, rgba(139,92,246,0.06) 0%, transparent 60%);
  }

  nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 1rem 3rem; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: rgba(13,17,23,0.9);
    backdrop-filter: blur(16px); z-index: 100;
  }
  .nav-logo {
    display: flex; align-items: center; gap: 0.7rem;
    font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 1.25rem;
    text-decoration: none; color: #fff;
  }
  .nav-logo-icon {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--orange), var(--pink));
    border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem;
  }
  .nav-logo span { color: var(--pink); }
  .nav-links { display: flex; align-items: center; gap: 2rem; }
  .nav-links a {
    color: var(--muted); text-decoration: none; font-size: 0.88rem;
    font-weight: 500; transition: color 0.2s; position: relative; padding-bottom: 2px;
  }
  .nav-links a.active { color: #fff; }
  .nav-links a.active::after {
    content: ''; position: absolute; bottom: -2px; left: 0; right: 0;
    height: 2px; background: linear-gradient(90deg, var(--orange), var(--pink)); border-radius: 2px;
  }
  .nav-links a:hover { color: #fff; }
  .nav-btn {
    background: rgba(255,255,255,0.07); border: 1px solid var(--border);
    color: var(--muted); padding: 0.45rem 1rem; border-radius: 6px;
    font-size: 0.83rem; font-weight: 500; cursor: pointer; transition: all 0.2s; text-decoration: none;
  }
  .nav-btn:hover { color: #fff; border-color: rgba(255,255,255,0.2); }

  .page-header {
    padding: 3.5rem 3rem 2rem; max-width: 1100px; margin: 0 auto;
    display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 1rem;
  }
  .page-header h1 { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 3rem; color: #fff; }
  .page-header h1 span {
    background: linear-gradient(135deg, var(--orange), var(--pink));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .page-header p { color: var(--muted); margin-top: 0.4rem; font-size: 0.9rem; }
  .event-count-badge {
    background: rgba(249,115,22,0.12); border: 1px solid rgba(249,115,22,0.25);
    color: var(--orange); padding: 0.5rem 1.2rem; border-radius: 2rem;
    font-size: 0.85rem; font-weight: 600; white-space: nowrap;
  }

  .controls {
    max-width: 1100px; margin: 0 auto 2rem; padding: 0 3rem;
    display: flex; gap: 0.8rem; flex-wrap: wrap;
  }
  .search-box {
    flex: 1; min-width: 220px;
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 0.75rem 1.1rem;
    color: var(--text); font-family: 'Inter', sans-serif;
    font-size: 0.9rem; outline: none; transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--orange); }
  .search-box::placeholder { color: rgba(255,255,255,0.25); }
  select {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 0.75rem 1.1rem;
    color: var(--text); font-family: 'Inter', sans-serif;
    font-size: 0.88rem; outline: none; cursor: pointer; transition: border-color 0.2s;
  }
  select:focus { border-color: var(--orange); }
  option { background: #1a2235; }

  .events-grid {
    max-width: 1100px; margin: 0 auto; padding: 0 3rem 4rem;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem;
  }

  .event-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 14px; padding: 1.6rem; transition: all 0.25s; cursor: pointer;
  }
  .event-card:hover { border-color: rgba(249,115,22,0.4); transform: translateY(-4px); box-shadow: 0 12px 40px rgba(249,115,22,0.1); }
  .event-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.2rem; }
  .event-card h3 { color: #fff; font-size: 1rem; font-weight: 700; line-height: 1.4; flex: 1; padding-right: 0.5rem; font-family: 'Montserrat', sans-serif; }
  .badge { font-size: 0.72rem; padding: 0.25rem 0.7rem; border-radius: 2rem; white-space: nowrap; font-weight: 600; }
  .badge-solo { background: rgba(249,115,22,0.15); color: var(--orange); border: 1px solid rgba(249,115,22,0.3); }
  .badge-group { background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }

  .event-info { display: flex; flex-direction: column; gap: 0.45rem; }
  .event-info-row { display: flex; align-items: center; gap: 0.5rem; color: var(--muted); font-size: 0.82rem; }

  .event-footer {
    margin-top: 1.2rem; padding-top: 1.1rem; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .event-club { color: var(--muted); font-size: 0.78rem; }
  .event-club strong { color: var(--orange); }
  .event-school { color: rgba(255,255,255,0.3); font-size: 0.74rem; text-align: right; max-width: 140px; line-height: 1.3; }

  .no-results { text-align: center; color: var(--muted); padding: 4rem 2rem; grid-column: 1/-1; }
  .loading { text-align: center; color: var(--muted); padding: 4rem 2rem; grid-column: 1/-1; }

  footer { border-top: 1px solid var(--border); padding: 2rem 3rem; text-align: center; color: var(--muted); font-size: 0.82rem; }
  footer span { color: var(--orange); }

  @media (max-width: 700px) {
    nav { padding: 1rem 1.5rem; }
    .page-header, .controls, .events-grid { padding-left: 1.5rem; padding-right: 1.5rem; }
    .events-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<nav>
  <a href="ojas_index.html" class="nav-logo">
    <div class="nav-logo-icon">🔥</div>
    OJAS <span>2K26</span>
  </a>
  <div class="nav-links" id="nav-links">
    <a href="ojas_index.html">Home</a>
    <a href="events.html" class="active">Events</a>
  </div>
</nav>

<div class="page-header">
  <div>
    <h1>All <span>Events</span></h1>
    <p id="event-count">Loading events...</p>
  </div>
  <div class="event-count-badge" id="event-badge">⏳ Loading</div>
</div>

<div class="controls">
  <input type="text" class="search-box" id="search" placeholder="🔍  Search event name..."/>
  <select id="filter-date">
    <option value="">All Dates</option>
    <option value="2026-03-28">28 March</option>
    <option value="2026-04-01">1 April</option>
    <option value="2026-04-02">2 April</option>
  </select>
  <select id="filter-type">
    <option value="">All Types</option>
    <option value="Solo">Solo</option>
    <option value="Group 1">Group 1</option>
    <option value="Group 2">Group 2</option>
  </select>
  <select id="filter-school">
    <option value="">All Schools</option>
    <option value="School of Arts, Humanities & Social Sciences">Arts & Humanities</option>
    <option value="School of Engineering">Engineering</option>
    <option value="School of Management Sciences">Management</option>
    <option value="School of Law, Governance & Public Policy">Law</option>
    <option value="School of Biosciences">Biosciences</option>
    <option value="School of Mathematics & Natural Sciences">Mathematics</option>
  </select>
</div>

<div class="events-grid" id="events-grid">
  <div class="loading">Loading events...</div>
</div>

<footer>OJAS 2K26 — <span>Chanakya University</span> · Student Affairs</footer>

<script>
const SUPA_URL = 'https://rinpqlroqxblsmjqcequ.supabase.co/rest/v1';
const KEY = 'sb_publishable_aEFZNFjFYQ21Eyxr3oORxQ_7Tdzz13F';
const headers = { 'apikey': KEY, 'Authorization': `Bearer ${KEY}` };

(function buildNav() {
  const session = JSON.parse(sessionStorage.getItem('ojas_session') || 'null');
  const nav = document.getElementById('nav-links');
  if (!session) { nav.innerHTML += `<a href="login.html" style="color:var(--orange);font-weight:600">Login</a>`; return; }
  if (session.role === 'admin') {
    nav.innerHTML += `<a href="dashboard.html">Dashboard</a><a href="add-event.html">Add Event</a><a href="#" onclick="logout()" class="nav-btn">Logout</a>`;
  } else {
    nav.innerHTML += `<a href="student.html">My Results</a><a href="#" onclick="logout()" class="nav-btn">Logout</a>`;
  }
})();
function logout() { sessionStorage.removeItem('ojas_session'); location.href = 'login.html'; }

let allEvents = [];

async function loadEvents() {
  const r = await fetch(`${SUPA_URL}/events?select=*&order=date.asc`, { headers });
  allEvents = await r.json();
  document.getElementById('event-count').textContent = `${allEvents.length} competitions across all schools`;
  document.getElementById('event-badge').textContent = `🎭 ${allEvents.length} Events`;
  renderEvents(allEvents);
}

function normalizeType(raw) {
  if (!raw) return 'Solo';
  const t = raw.trim().toLowerCase();
  if (t === 'solo') return 'Solo';
  if (t === 'group 1' || t === 'group1') return 'Group 1';
  if (t === 'group 2' || t === 'group2') return 'Group 2';
  if (t.startsWith('group')) return 'Group';
  return raw;
}

function renderEvents(events) {
  const grid = document.getElementById('events-grid');
  if (!events.length) { grid.innerHTML = '<div class="no-results">No events match your filters.</div>'; return; }
  grid.innerHTML = events.map(e => {
    const type = normalizeType(e.event_type);
    const isSolo = type.toLowerCase() === 'solo';
    return `
    <div class="event-card">
      <div class="event-card-top">
        <h3>${e.event_name}</h3>
        <span class="badge ${isSolo ? 'badge-solo' : 'badge-group'}">${type}</span>
      </div>
      <div class="event-info">
        <div class="event-info-row">📅 <span>${e.date || 'TBD'}</span></div>
        <div class="event-info-row">📍 <span>${e.venue || 'TBD'}</span></div>
        <div class="event-info-row">🕐 <span>${e.time || 'TBD'}</span></div>
      </div>
      <div class="event-footer">
        <div class="event-club">By <strong>${e.organizer_club || 'Student Affairs'}</strong></div>
        <div class="event-school">${e.school ? e.school.replace('School of ', '') : ''}</div>
      </div>
    </div>`;
  }).join('');
}

function filterEvents() {
  const search = document.getElementById('search').value.toLowerCase();
  const date = document.getElementById('filter-date').value;
  const type = document.getElementById('filter-type').value;
  const school = document.getElementById('filter-school').value;
  const filtered = allEvents.filter(e =>
    (!search || e.event_name.toLowerCase().includes(search)) &&
    (!date || e.date === date) &&
    (!type || e.event_type === type) &&
    (!school || e.school === school)
  );
  renderEvents(filtered);
}

['search','filter-date','filter-type','filter-school'].forEach(id => {
  document.getElementById(id).addEventListener(id === 'search' ? 'input' : 'change', filterEvents);
});

loadEvents();
</script>
</body>
</html>
