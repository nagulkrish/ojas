<style>
  :root { --primary: #10B981; --secondary: #34D399; --accent: #06B6D4; --dark-navy: #0D0B1A; --card-bg: #110F1F; --border: rgba(139,92,246,0.15); --text: #f1f5f9; --muted: rgba(255,255,255,0.45); --success: #10B981; --error: #EF4444; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--dark-navy); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; background-image: radial-gradient(ellipse 60% 40% at 90% 10%, rgba(139,92,246,0.06) 0%, transparent 60%), radial-gradient(ellipse 50% 40% at 10% 90%, rgba(245,158,11,0.05) 0%, transparent 60%); }
  nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 3rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(13,11,26,0.9); backdrop-filter: blur(16px); z-index: 100; }
  .nav-logo { display: flex; align-items: center; gap: 0.7rem; font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 1.25rem; text-decoration: none; color: #fff; }
  .nav-logo-icon { width: 34px; height: 34px; background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; }
  .nav-logo span { color: var(--accent); }
  .nav-links { display: flex; align-items: center; gap: 2rem; }
  .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.88rem; font-weight: 500; transition: color 0.2s; position: relative; padding-bottom: 2px; }
  .nav-links a.active { color: #fff; }
  .nav-links a.active::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 2px; }
  .nav-links a:hover { color: #fff; }
  .nav-btn { background: rgba(139,92,246,0.1); border: 1px solid var(--border); color: var(--muted); padding: 0.45rem 1rem; border-radius: 6px; font-size: 0.83rem; font-weight: 500; cursor: pointer; transition: all 0.2s; text-decoration: none; }
  .nav-btn:hover { color: #fff; }
  .page-header { padding: 3.5rem 3rem 2rem; max-width: 780px; margin: 0 auto; }
  .page-header h1 { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 3rem; color: #fff; }
  .page-header h1 span { background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .page-header p { color: var(--muted); margin-top: 0.4rem; font-size: 0.9rem; }
  .form-container { max-width: 780px; margin: 0 auto; padding: 0 3rem 4rem; }
  .form-section { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; margin-bottom: 1.5rem; }
  .form-section-header { display: flex; align-items: center; gap: 0.7rem; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
  .form-section-icon { width: 36px; height: 36px; border-radius: 9px; background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(245,158,11,0.2)); border: 1px solid rgba(139,92,246,0.25); display: flex; align-items: center; justify-content: center; font-size: 1rem; }
  .form-section h2 { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 1.1rem; color: #fff; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .span-2 { grid-column: span 2; }
  .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
  .form-group label { font-size: 0.75rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; }
  .form-group input, .form-group select, .form-group textarea { background: rgba(139,92,246,0.04); border: 1px solid var(--border); border-radius: 10px; padding: 0.8rem 1rem; color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.9rem; outline: none; transition: all 0.2s; width: 100%; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); background: rgba(139,92,246,0.08); }
  .form-group input::placeholder, .form-group textarea::placeholder { color: rgba(255,255,255,0.2); }
  .form-group textarea { resize: vertical; min-height: 80px; }
  select option { background: #1a1530; }
  .btn-submit { width: 100%; background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; border: none; border-radius: 10px; padding: 0.95rem; font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 1rem; box-shadow: 0 4px 20px rgba(139,92,246,0.25); }
  .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(139,92,246,0.35); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .toast { position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 1.5rem; border-radius: 10px; font-size: 0.9rem; font-weight: 500; z-index: 999; transform: translateY(120px); opacity: 0; transition: all 0.3s; backdrop-filter: blur(8px); }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: rgba(16,185,129,0.9); color: #fff; }
  .toast.error { background: rgba(239,68,68,0.9); color: #fff; }
  footer { border-top: 1px solid var(--border); padding: 2rem 3rem; text-align: center; color: var(--muted); font-size: 0.82rem; }
  footer span { color: var(--accent); }
  @media (max-width: 700px) { nav, .page-header, .form-container, footer { padding-left: 1.5rem; padding-right: 1.5rem; } .form-grid { grid-template-columns: 1fr; } .span-2 { grid-column: span 1; } }
</style>
</head>
<body>
<nav>
  <a href="samyuti_index.html" class="nav-logo"><div class="nav-logo-icon">🌿</div>Samyuti <span>2K26</span></a>
  <div class="nav-links">
    <a href="samyuti_index.html">Home</a><a href="samyuti_events.html">Events</a>
    <a href="samyuti_dashboard.html">Dashboard</a><a href="samyuti_add-event.html" class="active">Add Event</a>
    <a href="#" onclick="logout()" class="nav-btn">Logout</a>
  </div>
</nav>
<div class="page-header">
  <h1>Add <span>Event</span></h1>
  <p>Coordinators can log new Samyuti event and participant details here</p>
</div>
<div class="form-container">
  <div class="form-section">
    <div class="form-section-header"><div class="form-section-icon">📋</div><h2>Event Details</h2></div>
    <div class="form-grid">
      <div class="form-group span-2"><label>Event Name *</label><input type="text" id="event-name" placeholder="e.g. Classical Vocal Solo"/></div>
      <div class="form-group"><label>Date *</label><input type="date" id="event-date"/></div>
      <div class="form-group"><label>Time</label><input type="text" id="event-time" placeholder="e.g. 9:30 - 10:30 AM"/></div>
      <div class="form-group"><label>Venue</label><input type="text" id="event-venue" placeholder="e.g. Preksha Auditorium"/></div>
      <div class="form-group"><label>Organizer / Club</label><input type="text" id="event-organizer" placeholder="e.g. Music Club"/></div>
      <div class="form-group"><label>Event Type</label><select id="event-type"><option value="Solo">Solo</option><option value="Group 1">Group 1</option><option value="Group 2">Group 2</option></select></div>
      <div class="form-group"><label>Organising School</label><select id="event-school"><option value="">Select school...</option><option>School of Arts, Humanities &amp; Social Sciences</option><option>School of Engineering</option><option>School of Management Sciences</option><option>School of Law, Governance &amp; Public Policy</option><option>School of Biosciences</option><option>School of Mathematics &amp; Natural Sciences</option></select></div>
    </div>
    <button class="btn-submit" onclick="submitEvent(this)">➕ Add Event</button>
  </div>
  <div class="form-section">
    <div class="form-section-header"><div class="form-section-icon">🎓</div><h2>Add Participant</h2></div>
    <div class="form-grid">
      <div class="form-group"><label>Participant Name *</label><input type="text" id="p-name" placeholder="Full name"/></div>
      <div class="form-group"><label>University Email *</label><input type="email" id="p-email" placeholder="name.course25@chanakyauniversity.edu.in"/></div>
      <div class="form-group"><label>Contact Number</label><input type="text" id="p-phone" placeholder="10-digit mobile"/></div>
      <div class="form-group"><label>School</label><select id="p-school"><option value="">Select school...</option><option>School of Arts, Humanities &amp; Social Sciences</option><option>School of Engineering</option><option>School of Management Sciences</option><option>School of Law, Governance &amp; Public Policy</option><option>School of Biosciences</option><option>School of Mathematics &amp; Natural Sciences</option></select></div>
    </div>
    <button class="btn-submit" onclick="submitParticipant(this)">➕ Add Participant</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<footer>Samyuti 2K26 — <span>Chanakya University</span> · Inter-University Fest</footer>
<script>
const SUPA_URL = 'https://rinpqlroqxblsmjqcequ.supabase.co/rest/v1';
const KEY = 'sb_publishable_aEFZNFjFYQ21Eyxr3oORxQ_7Tdzz13F';
const headers = { 'apikey': KEY, 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };
const PREFIX = 'samyuti_';
const SESSION_KEY = 'samyuti_session';

const _session = JSON.parse(sessionStorage.getItem(SESSION_KEY) || 'null');
if (!_session || _session.role !== 'admin') location.replace('samyuti_login.html');
function logout() { sessionStorage.removeItem(SESSION_KEY); location.href = 'samyuti_login.html'; }

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3500);
}
async function submitEvent(btn) {
  const name = document.getElementById('event-name').value.trim();
  const date = document.getElementById('event-date').value;
  if (!name || !date) { showToast('Event name and date are required!', 'error'); return; }
  btn.disabled = true; btn.textContent = 'Saving...';
  const data = { event_name: name, date, time: document.getElementById('event-time').value, venue: document.getElementById('event-venue').value, organizer_club: document.getElementById('event-organizer').value, event_type: document.getElementById('event-type').value, school: document.getElementById('event-school').value };
  const res = await fetch(`${SUPA_URL}/${PREFIX}events`, { method: 'POST', headers, body: JSON.stringify(data) });
  if (res.ok) { showToast('✅ Event added successfully!'); ['event-name','event-date','event-time','event-venue','event-organizer'].forEach(id => document.getElementById(id).value = ''); }
  else { showToast('❌ Failed to add event. Try again.', 'error'); }
  btn.disabled = false; btn.textContent = '➕ Add Event';
}
async function submitParticipant(btn) {
  const name = document.getElementById('p-name').value.trim();
  const email = document.getElementById('p-email').value.trim();
  if (!name || !email) { showToast('Name and email are required!', 'error'); return; }
  btn.disabled = true; btn.textContent = 'Saving...';
  const data = { name, email, phone: document.getElementById('p-phone').value, school: document.getElementById('p-school').value };
  const res = await fetch(`${SUPA_URL}/${PREFIX}participants`, { method: 'POST', headers, body: JSON.stringify(data) });
  if (res.ok) { showToast('✅ Participant added successfully!'); ['p-name','p-email','p-phone'].forEach(id => document.getElementById(id).value = ''); }
  else { const err = await res.json(); if (err.code === '23505') showToast('⚠️ Email already registered!', 'error'); else showToast('❌ Failed to add participant.', 'error'); }
  btn.disabled = false; btn.textContent = '➕ Add Participant';
}
</script>
</body>
</html>
