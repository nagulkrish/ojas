<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://rinpqlroqxblsmjqcequ.supabase.co; img-src 'self' data: blob:;"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Results — Srujana 2K26</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --primary: #8B5CF6; --secondary: #A78BFA; --accent: #F59E0B;
    --dark-navy: #0D0B1A; --card-bg: #110F1F;
    --border: rgba(139,92,246,0.15); --text: #f1f5f9; --muted: rgba(255,255,255,0.45);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--dark-navy); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; background-image: radial-gradient(ellipse 70% 40% at 80% 10%, rgba(139,92,246,0.06) 0%, transparent 60%), radial-gradient(ellipse 50% 40% at 20% 90%, rgba(245,158,11,0.05) 0%, transparent 60%); }
  nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 3rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(13,11,26,0.9); backdrop-filter: blur(16px); z-index: 100; }
  .nav-logo { display: flex; align-items: center; gap: 0.7rem; font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 1.25rem; text-decoration: none; color: #fff; }
  .nav-logo-icon { width: 34px; height: 34px; background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; }
  .nav-logo span { color: var(--accent); }
  .nav-links { display: flex; align-items: center; gap: 2rem; }
  .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.88rem; font-weight: 500; transition: color 0.2s; position: relative; padding-bottom: 2px; }
  .nav-links a.active { color: #fff; }
  .nav-links a.active::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 2px; }
  .nav-links a:hover { color: #fff; }
  .nav-btn { background: rgba(139,92,246,0.1); border: 1px solid var(--border); color: var(--muted); padding: 0.45rem 1rem; border-radius: 6px; font-size: 0.83rem; font-weight: 500; cursor: pointer; transition: all 0.2s; text-decoration: none; }
  .nav-btn:hover { color: #fff; }
  .page-header { padding: 3.5rem 3rem 2rem; max-width: 760px; margin: 0 auto; }
  .page-header h1 { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 3rem; color: #fff; }
  .page-header h1 span { background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .page-header p { color: var(--muted); margin-top: 0.4rem; font-size: 0.9rem; }
  .search-section { max-width: 760px; margin: 0 auto 2.5rem; padding: 0 3rem; }
  .search-form { display: flex; gap: 0.8rem; }
  .search-input { flex: 1; background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 0.9rem 1.2rem; color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
  .search-input:focus { border-color: var(--primary); }
  .search-input::placeholder { color: rgba(255,255,255,0.25); }
  .btn-search { background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; border: none; border-radius: 10px; padding: 0.9rem 1.8rem; font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.2s; white-space: nowrap; box-shadow: 0 4px 16px rgba(139,92,246,0.3); }
  .btn-search:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(139,92,246,0.4); }
  .results-section { max-width: 760px; margin: 0 auto; padding: 0 3rem 4rem; }
  .student-card { background: var(--card-bg); border: 1px solid rgba(139,92,246,0.3); border-radius: 16px; padding: 1.5rem 2rem; margin-bottom: 1.5rem; position: relative; overflow: hidden; }
  .student-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--primary), var(--accent)); }
  .student-name { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 1.8rem; color: #fff; margin-bottom: 0.4rem; }
  .student-meta { color: var(--muted); font-size: 0.85rem; }
  .student-school { color: var(--secondary); font-size: 0.83rem; margin-top: 0.3rem; font-weight: 500; }
  .events-section { margin-bottom: 2rem; }
  .events-section h2 { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 1.2rem; color: #fff; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
  .reg-count { background: rgba(139,92,246,0.15); color: var(--secondary); border: 1px solid rgba(139,92,246,0.25); border-radius: 2rem; font-size: 0.75rem; padding: 0.2rem 0.65rem; font-family: 'Inter', sans-serif; font-weight: 600; }
  .reg-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 1.1rem 1.4rem; margin-bottom: 0.7rem; display: flex; justify-content: space-between; align-items: center; transition: border-color 0.2s; }
  .reg-card:hover { border-color: rgba(139,92,246,0.3); }
  .reg-event { font-weight: 600; color: #fff; font-size: 0.92rem; }
  .reg-venue { color: var(--muted); font-size: 0.8rem; margin-top: 0.2rem; }
  .winner-badge { display: flex; align-items: center; gap: 0.4rem; background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(245,158,11,0.15)); border: 1px solid rgba(139,92,246,0.35); color: var(--secondary); border-radius: 6px; padding: 0.35rem 0.9rem; font-size: 0.8rem; font-weight: 700; white-space: nowrap; }
  .no-winner { color: rgba(255,255,255,0.3); font-size: 0.8rem; }
  .msg { text-align: center; padding: 4rem 1rem; }
  .msg-icon { font-size: 3rem; margin-bottom: 1rem; }
  .msg p { color: var(--muted); font-size: 0.95rem; }
  .req-status-badge { display: flex; align-items: center; padding: 0.35rem 0.9rem; border-radius: 6px; font-size: 0.8rem; font-weight: 700; white-space: nowrap; }
  .status-pending { background: rgba(245,158,11,0.12); color: #F59E0B; border: 1px solid rgba(245,158,11,0.3); }
  .status-approved { background: rgba(16,185,129,0.12); color: #10B981; border: 1px solid rgba(16,185,129,0.3); }
  .status-denied { background: rgba(239,68,68,0.12); color: #EF4444; border: 1px solid rgba(239,68,68,0.3); }
  footer { border-top: 1px solid var(--border); padding: 2rem 3rem; text-align: center; color: var(--muted); font-size: 0.82rem; }
  footer span { color: var(--accent); }
  @media (max-width: 700px) { nav, .page-header, .search-section, .results-section, footer { padding-left: 1.5rem; padding-right: 1.5rem; } .search-form { flex-direction: column; } }
</style>
</head>
<body>
<nav>
  <a href="srujana_index.html" class="nav-logo">
    <div class="nav-logo-icon">🎨</div>
    Srujana <span>2K26</span>
  </a>
  <div class="nav-links">
    <a href="srujana_index.html">Home</a>
    <a href="srujana_events.html">Events</a>
    <a href="srujana_student.html" class="active">My Results</a>
    <a href="#" onclick="logout()" class="nav-btn">Logout</a>
  </div>
</nav>
<div class="page-header">
  <h1>My <span>Results</span></h1>
  <p>Search by your name or email to see all your registrations and competition results</p>
</div>
<div class="search-section">
  <div class="search-form">
    <input type="text" class="search-input" id="search-input" placeholder="Enter your name or email..."/>
    <button class="btn-search" onclick="searchStudent()">Search →</button>
  </div>
</div>
<div class="results-section" id="results">
  <div class="msg"><div class="msg-icon">🔍</div><p>Enter your name or university email above to see your events and results</p></div>
</div>
<footer>Srujana 2K26 — <span>Chanakya University</span> · Cultural Fest</footer>
<script>
const SUPA_URL = 'https://rinpqlroqxblsmjqcequ.supabase.co/rest/v1';
const KEY = 'sb_publishable_aEFZNFjFYQ21Eyxr3oORxQ_7Tdzz13F';
const headers = { 'apikey': KEY, 'Authorization': `Bearer ${KEY}` };
const PREFIX = 'srujana_';
const SESSION_KEY = 'srujana_session';

const _session = JSON.parse(sessionStorage.getItem(SESSION_KEY) || 'null');
const _urlEmail = new URLSearchParams(location.search).get('email');
if (!_session && !_urlEmail) location.replace('srujana_login.html');
function logout() { sessionStorage.removeItem(SESSION_KEY); location.href = 'srujana_login.html'; }

window.addEventListener('DOMContentLoaded', () => {
  const email = _urlEmail || (_session && _session.email);
  if (email) { document.getElementById('search-input').value = email; searchStudent(); }
  if (!_session) { const b = document.querySelector('.nav-btn'); if (b) b.style.display = 'none'; }
});

async function get(table, params = '') {
  const r = await fetch(`${SUPA_URL}/${table}${params}`, { headers });
  return r.json();
}

async function searchStudent() {
  const query = document.getElementById('search-input').value.trim();
  const results = document.getElementById('results');
  if (!query) return;
  results.innerHTML = '<div class="msg"><div class="msg-icon">⏳</div><p>Searching...</p></div>';

  const participants = await get(PREFIX + 'participants', `?or=(name.ilike.*${encodeURIComponent(query)}*,email.ilike.*${encodeURIComponent(query)}*)`);
  const isEmail = query.includes('@');
  const reqParam = isEmail ? `?email=ilike.${encodeURIComponent(query)}&order=submitted_at.desc` : `?name=ilike.*${encodeURIComponent(query)}*&order=submitted_at.desc`;
  const requests = await get(PREFIX + 'registration_requests', reqParam).catch(() => []);

  if (!participants.length && !requests.length) {
    results.innerHTML = '<div class="msg"><div class="msg-icon">😕</div><p>No student found. Try a different name or email.</p></div>';
    return;
  }

  let html = '';
  if (requests.length) {
    const email = requests[0].email;
    const displayName = participants.find(p => p.email?.toLowerCase() === email.toLowerCase())?.name || requests[0].name;
    if (!participants.length) {
      html += `<div class="student-card"><div class="student-name">${displayName}</div><div class="student-meta">📧 ${email}</div><div class="student-school">🏫 ${requests[0].school || 'Chanakya University'}</div></div>`;
    }
    html += `<div class="events-section"><h2>Registration Requests <span class="reg-count">${requests.length}</span></h2>${requests.map(r => `<div class="reg-card"><div><div class="reg-event">${r.event_name || 'Unknown Event'}</div><div class="reg-venue">📅 Submitted ${r.submitted_at ? new Date(r.submitted_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : 'N/A'}</div></div><div class="req-status-badge status-${r.status}">${r.status === 'pending' ? '⏳ Pending Approval' : r.status === 'approved' ? '✅ Approved' : '❌ Denied'}</div></div>`).join('')}</div>`;
  }

  for (const p of participants) {
    const regs = await get(PREFIX + 'registrations', `?participant_id=eq.${p.participant_id}&select=registration_id,event_id`);
    const eventIds = regs.map(r => r.event_id).join(',');
    const events = eventIds ? await get(PREFIX + 'events', `?event_id=in.(${eventIds})&select=event_id,event_name,date,venue`) : [];
    const eventsMap = {}; events.forEach(e => eventsMap[e.event_id] = e);
    const regIds = regs.map(r => r.registration_id).join(',');
    const resultsList = regIds ? await get(PREFIX + 'results', `?registration_id=in.(${regIds})&select=registration_id,position,award,winner_name`) : [];
    const resultsMap = {}; resultsList.forEach(r => resultsMap[r.registration_id] = r);

    html += `<div class="student-card"><div class="student-name">${p.name}</div><div class="student-meta">📧 ${p.email} &nbsp;·&nbsp; 📱 ${p.phone || 'N/A'}</div><div class="student-school">🏫 ${p.school || 'Chanakya University'}</div></div>
    <div class="events-section"><h2>Registered Events <span class="reg-count">${regs.length}</span></h2>${regs.length === 0 ? '<p style="color:var(--muted);font-size:0.9rem">No registrations found.</p>' : regs.map(r => { const ev = eventsMap[r.event_id] || {}; const res = resultsMap[r.registration_id]; return `<div class="reg-card"><div><div class="reg-event">${ev.event_name || 'Unknown Event'}</div><div class="reg-venue">📅 ${ev.date || 'TBD'} &nbsp;·&nbsp; 📍 ${ev.venue || 'TBD'}</div></div>${res ? `<div class="winner-badge">🏆 ${res.position} · ${res.award}</div>` : '<div class="no-winner">Participated</div>'}</div>`; }).join('')}</div>`;
  }
  results.innerHTML = html;
}
document.getElementById('search-input').addEventListener('keypress', e => { if (e.key === 'Enter') searchStudent(); });
</script>
</body>
</html>
